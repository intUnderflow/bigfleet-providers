name: Release

# Triggered by the ROOT module tag (vX.Y.Z). Submodule tags like
# providers/aws/vX.Y.Z don't start with "v", so they never trigger this.
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write # create the GitHub Release
  packages: write # push image + chart to ghcr.io

jobs:
  # Gate the release on a full conformance certification (all 92 behaviors). The
  # runner exits non-zero unless the verdict is CERTIFIED, so a regression blocks
  # the release.
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: conformance/go.mod
          cache-dependency-path: conformance/go.sum
      - name: Full conformance certification (baseline + every lane)
        env:
          BFCONF_SCALE_SEED: "4000"
          BFCONF_SOAK: "5s"
        run: |
          make report-aws \
            PROFILE=core,cloud,spot,fault,durable,scale \
            OUT="$GITHUB_WORKSPACE/release-report"
      - uses: actions/upload-artifact@v4
        with:
          name: conformance-report
          path: release-report

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/intunderflow/bigfleet-aws
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - name: Build + push the AWS provider image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: providers/aws/deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Package + push the Helm chart (OCI)
        run: |
          mkdir -p /tmp/charts
          helm package providers/aws/deploy/helm --destination /tmp/charts
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm push /tmp/charts/*.tgz oci://ghcr.io/intunderflow/charts
      - uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: /tmp/charts/*.tgz

  release:
    needs: [certify, image, helm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Only the conformance report is fetched cross-job (one named artifact,
      # not "all" — that download is flaky). The chart is re-packaged locally for
      # the release asset; it is already published to the OCI registry by `helm`.
      - uses: actions/download-artifact@v4
        with:
          name: conformance-report
          path: report
      - uses: azure/setup-helm@v4
      - run: helm package providers/aws/deploy/helm --destination charts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: CHANGELOG.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            report/report.json
            report/junit.xml
            report/badge.json
            charts/*.tgz
