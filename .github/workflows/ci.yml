name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Build each module standalone; never let a local go.work mask a per-module go.mod.
env:
  GOWORK: "off"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Smart change detection: figure out the minimum work this push/PR needs.
  # A providerkit change rebuilds ALL providers (they depend on the kit); a
  # tooling change runs everything; otherwise only the changed providers/site.
  changes:
    runs-on: ubuntu-latest
    outputs:
      run_kit: ${{ steps.detect.outputs.run_kit }}
      run_site: ${{ steps.detect.outputs.run_site }}
      run_conformance: ${{ steps.detect.outputs.run_conformance }}
      providers: ${{ steps.detect.outputs.providers }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so diff bases (merge-base / before-SHA) resolve
      - id: detect
        run: ./hack/ci-changes.sh
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_REF: ${{ github.base_ref }}

  # The bigfleet proto pin must match across every module (root is the source of
  # truth) so all modules build against one wire contract. Cheap; always runs.
  pins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make check-bigfleet-pin

  # The shared library (root module). Runs only when the kit (or tooling) changed.
  providerkit:
    needs: changes
    if: needs.changes.outputs.run_kit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: gofmt
        run: |
          unformatted="$(gofmt -l providerkit)"
          [ -z "$unformatted" ] || { echo "not gofmt-clean:"; echo "$unformatted"; exit 1; }
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -count=1 ./...
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          args: ./...

  # Per-changed-provider build / vet / test / lint / tidy-check. Each runs INSIDE
  # the provider's own module (root ./... cannot see submodules).
  provider:
    needs: changes
    if: needs.changes.outputs.providers != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJSON(needs.changes.outputs.providers) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: providers/${{ matrix.provider }}/go.mod
          cache-dependency-path: providers/${{ matrix.provider }}/go.sum
      - name: gofmt
        run: |
          unformatted="$(gofmt -l providers/${{ matrix.provider }})"
          [ -z "$unformatted" ] || { echo "not gofmt-clean:"; echo "$unformatted"; exit 1; }
      - run: go -C providers/${{ matrix.provider }} build -o "$RUNNER_TEMP/" ./... # temp -o: no in-tree binary
      - run: go -C providers/${{ matrix.provider }} vet ./...
      - run: go -C providers/${{ matrix.provider }} test -race -count=1 ./...
      - name: go mod tidy is clean
        run: |
          go -C providers/${{ matrix.provider }} mod tidy
          git diff --exit-code providers/${{ matrix.provider }}/go.mod providers/${{ matrix.provider }}/go.sum
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          working-directory: providers/${{ matrix.provider }}
          args: ./...

  # The conformance EXTENSION suite module (the harness + the certify suite):
  # build, vet, test, lint. Runs when the conformance module (or tooling) changed.
  conformance-module:
    needs: changes
    if: needs.changes.outputs.run_conformance == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: conformance/go.mod
          cache-dependency-path: conformance/go.sum
      - run: make build-conformance test-conformance
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          working-directory: conformance
          args: --build-tags=certify ./...

  # Full certification (upstream baseline + extension suite) per changed
  # provider, credential-free. A provider that needs cloud creds opts out with a
  # providers/<name>/.ci-no-conformance marker (skipped, never failed).
  certify:
    needs: changes
    if: needs.changes.outputs.providers != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJSON(needs.changes.outputs.providers) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: providers/${{ matrix.provider }}/go.mod
          cache-dependency-path: providers/${{ matrix.provider }}/go.sum
      - id: gate
        run: |
          if [ -f "providers/${{ matrix.provider }}/.ci-no-conformance" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "providers/${{ matrix.provider }} opts out of credential-free certification"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Certify (upstream baseline + extension suite)
        if: steps.gate.outputs.skip != 'true'
        # run-certify.sh clones bigfleet at the pinned version itself when
        # BIGFLEET_SRC is unset.
        run: make certify-${{ matrix.provider }}

  # Full certification of EVERY changed provider via the bfconformance runner:
  # the extension + FAULT + DURABILITY + SCALE lanes across all 92 behaviours,
  # credential-free, emitting a per-behaviour VERDICT + JUnit/JSON report. This is
  # what proves a module is fully certified — the `certify` job above only runs
  # the baseline + core-shaped extension. Inapplicable lanes/profiles skip-as-pass
  # so the verdict stays meaningful (e.g. an on-demand-only provider's spot lane).
  # The upstream baseline is covered by `certify`, so -skip-baseline here. The
  # fault lane always exercises the reference faultprovider (not the target), so
  # it re-runs per leg for a uniform report. Scale runs at a lighter seed/soak for
  # CI (a nightly job can crank it). A provider that cannot stand up credential-
  # free opts out with a providers/<name>/.ci-no-conformance marker.
  certify-full:
    needs: changes
    if: needs.changes.outputs.providers != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJSON(needs.changes.outputs.providers) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: conformance/go.mod
          cache-dependency-path: conformance/go.sum
      - id: gate
        run: |
          if [ -f "providers/${{ matrix.provider }}/.ci-no-conformance" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "providers/${{ matrix.provider }} opts out of credential-free certification"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Full certification — extension + fault + durable + scale lanes
        if: steps.gate.outputs.skip != 'true'
        env:
          BFCONF_SCALE_SEED: "4000"
          BFCONF_SOAK: "5s"
        run: |
          GOWORK=off go -C conformance run ./cmd/bfconformance -provider ${{ matrix.provider }} \
            -profile core,cloud,spot,fault,durable,scale -skip-baseline \
            -out "$GITHUB_WORKSPACE/conformance-report/${{ matrix.provider }}"
      - uses: actions/upload-artifact@v4
        if: always() && steps.gate.outputs.skip != 'true'
        with:
          name: conformance-report-${{ matrix.provider }}
          path: conformance-report/${{ matrix.provider }}

  # Build the container image and lint the Helm chart for each changed provider's
  # deploy artifacts. Neither is exercised elsewhere in CI (release.yml builds
  # only aws), so a broken provider Dockerfile/chart would otherwise reach review
  # unvalidated. Providers without deploy/ artifacts (e.g. _template) are skipped.
  deploy:
    needs: changes
    if: needs.changes.outputs.providers != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJSON(needs.changes.outputs.providers) }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: helm lint
        run: |
          chart="providers/${{ matrix.provider }}/deploy/helm"
          if [ -d "$chart" ]; then helm lint "$chart"; else echo "no Helm chart for ${{ matrix.provider }}; skipping"; fi
      - name: docker build (from repo root so the multi-module replace resolves)
        run: |
          df="providers/${{ matrix.provider }}/deploy/Dockerfile"
          if [ -f "$df" ]; then
            docker build -f "$df" -t "bf-${{ matrix.provider }}:ci" .
          else
            echo "no Dockerfile for ${{ matrix.provider }}; skipping"
          fi

  # Vulnerability scan across every module (reachable/called vulns only). On a PR
  # it GATES, but only on vulnerabilities the change INTRODUCES — reachable on the
  # branch but not on the base — so pre-existing or Go-toolchain stdlib advisories
  # already on the base never red-line a PR. On push to main it is informational.
  # The delta logic lives in hack/govulncheck.sh.
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need base history for the delta worktree
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: scan (delta-gate on PR, informational on push)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --quiet origin "${{ github.base_ref }}"
            ./hack/govulncheck.sh "origin/${{ github.base_ref }}"
          else
            ./hack/govulncheck.sh
          fi

  # The Astro site build-check (Cloudflare Pages deploys it; this just catches a
  # broken build in review). Runs when site/ OR any provider's docs/ changed.
  site:
    needs: changes
    if: needs.changes.outputs.run_site == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
        working-directory: site
      - run: npm run build
        working-directory: site

  # Single aggregation gate for branch protection: green unless a job that
  # actually ran failed (skipped jobs are fine). Make THIS the required check.
  ci-ok:
    needs: [changes, pins, providerkit, provider, conformance-module, certify, certify-full, deploy, govulncheck, site]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All required jobs succeeded or were skipped
        run: |
          results='${{ join(needs.*.result, ' ') }}'
          echo "job results: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::a required job did not succeed"
              exit 1
            fi
          done
          echo "ok"
