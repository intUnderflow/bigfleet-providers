{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "bigfleet-aws.serviceAccountName" . }}
  labels:
    {{- include "bigfleet-aws.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.serviceAccount.roleArn }}
    # IRSA: STS web-identity federation to the provider's least-privilege role.
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.roleArn | quote }}
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end -}}
