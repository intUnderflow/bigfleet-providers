apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bigfleet-aws.fullname" . }}
  labels:
    {{- include "bigfleet-aws.labels" . | nindent 4 }}
spec:
  # One process per region: do not scale this beyond 1.
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "bigfleet-aws.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bigfleet-aws.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- if .Values.offerings.content }}
        checksum/offerings: {{ .Values.offerings.content | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "bigfleet-aws.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: aws
          image: {{ include "bigfleet-aws.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - --addr=:{{ .Values.ports.grpc }}
            - --metrics-addr=:{{ .Values.ports.metrics }}
            {{- if .Values.region }}
            - --region={{ .Values.region }}
            {{- end }}
            {{- if .Values.provider }}
            - --provider={{ .Values.provider }}
            {{- end }}
            - --ec2-backend={{ .Values.ec2Backend }}
            - --reflection={{ .Values.reflection }}
            - --spot-refresh={{ .Values.spotRefresh }}
            - --reconcile-interval={{ .Values.reconcileInterval }}
            {{- if .Values.ec2.ami }}
            - --ami={{ .Values.ec2.ami }}
            {{- end }}
            {{- if .Values.ec2.subnets }}
            - --subnets={{ .Values.ec2.subnets }}
            {{- end }}
            {{- if .Values.ec2.securityGroups }}
            - --security-groups={{ .Values.ec2.securityGroups }}
            {{- end }}
            {{- if .Values.ec2.iamInstanceProfile }}
            - --iam-instance-profile={{ .Values.ec2.iamInstanceProfile }}
            {{- end }}
            {{- if .Values.ec2.keyName }}
            - --key-name={{ .Values.ec2.keyName }}
            {{- end }}
            - --bootstrap-hook={{ .Values.ec2.bootstrapHook }}
            {{- if .Values.ec2.zoneA }}
            - --zone-a={{ .Values.ec2.zoneA }}
            {{- end }}
            {{- if .Values.ec2.zoneB }}
            - --zone-b={{ .Values.ec2.zoneB }}
            {{- end }}
            - --seed-count={{ .Values.ec2.seedCount }}
            {{- if .Values.offerings.content }}
            - --offerings=/etc/bigfleet/offerings/offerings.json
            {{- end }}
            {{- if .Values.baseUserData.content }}
            - --base-user-data=/etc/bigfleet/base-user-data/base-user-data
            {{- end }}
            {{- if .Values.spotInterruptionQueue }}
            - --spot-interruption-queue={{ .Values.spotInterruptionQueue }}
            {{- end }}
            {{- if .Values.state.enabled }}
            - --state={{ .Values.state.path }}
            {{- end }}
            {{- if .Values.tls.enabled }}
            - --tls-cert=/etc/bigfleet/tls/tls.crt
            - --tls-key=/etc/bigfleet/tls/tls.key
            {{- if .Values.tls.mtls }}
            - --tls-ca=/etc/bigfleet/tls/ca.crt
            {{- end }}
            {{- end }}
            {{- with .Values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.ports.grpc }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.ports.metrics }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.offerings.content }}
            - name: offerings
              mountPath: /etc/bigfleet/offerings
              readOnly: true
            {{- end }}
            {{- if .Values.baseUserData.content }}
            - name: base-user-data
              mountPath: /etc/bigfleet/base-user-data
              readOnly: true
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /etc/bigfleet/tls
              readOnly: true
            {{- end }}
            {{- if .Values.state.enabled }}
            - name: state
              mountPath: {{ dir .Values.state.path }}
            {{- end }}
      volumes:
        {{- if .Values.offerings.content }}
        - name: offerings
          configMap:
            name: {{ include "bigfleet-aws.fullname" . }}-offerings
        {{- end }}
        {{- if .Values.baseUserData.content }}
        - name: base-user-data
          configMap:
            name: {{ include "bigfleet-aws.fullname" . }}-base-user-data
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- end }}
        {{- if .Values.state.enabled }}
        - name: state
          {{- if .Values.state.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "bigfleet-aws.fullname" . }}-state
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
