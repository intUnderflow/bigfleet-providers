# Values for the bigfleet-ovhcloud chart.
#
# One release per OVH region. To run several regions, install the chart once per
# region with a distinct release name, region, and OpenStack-user Secret, e.g.:
#
#   helm install ovh-gra ./helm \
#     --set region=GRA \
#     --set provider=ovh-public-GRA \
#     --set openstack.secretName=bigfleet-ovh-gra-os \
#     --set-file offerings.content=offerings.gra.json

image:
  repository: ghcr.io/intunderflow/bigfleet-ovhcloud
  tag: ""            # defaults to .Chart.AppVersion when empty
  pullPolicy: IfNotPresent
imagePullSecrets: []

# Number of replicas. Keep at 1 per region: the provider holds region-scoped
# state and is the single CapacityProvider process for its region.
replicaCount: 1

# --- core provider config ---------------------------------------------------
# OVH/OpenStack region (sets --region and the first default-offering region).
region: GRA
# Second region for the default offerings (--region-b). MUST be empty (or equal
# to `region`) for the real backend: it runs one process per region and rejects
# any offering outside `region`, so a second region here would CrashLoop the pod
# when relying on the default offerings. Leave empty (the chart then omits
# --region-b, and it defaults to `region`); only set it for a fake-backend
# multi-region dev demo.
regionB: ""
# HostRef provider label (--provider), e.g. ovh-public-GRA.
provider: ""
# OVH backend mode: auto | ovh | fake (--ovh-backend). auto = ovh when --region
# is set.
ovhBackend: auto

ports:
  # gRPC CapacityProvider (--addr).
  grpc: 9000
  # /metrics, /healthz, /readyz (--metrics-addr).
  metrics: 9090

# --- OVH Public Cloud (OpenStack) instance parameters -----------------------
ovh:
  image: ""                     # --image (base image id/UUID), REQUIRED for the real backend
  keyName: ""                   # --key-name (OpenStack keypair injected for SSH access)
  network: Ext-Net              # --network (network name or UUID; empty = project default)
  eurToUSD: 1.08                # --eur-usd (EUR->USD price conversion)
  bootstrapHook: /opt/bigfleet/bootstrap   # --bootstrap-hook
  seedCount: 32                 # --seed-count (default offerings size)

# --- OpenStack credentials (Keystone v3) ------------------------------------
# The provider authenticates with an OpenStack USER scoped to the Public Cloud
# project, read from the standard OS_* environment via gophercloud. The Secret
# must hold those keys (OS_AUTH_URL, OS_USERNAME, OS_PASSWORD, OS_PROJECT_ID,
# OS_USER_DOMAIN_NAME, OS_PROJECT_DOMAIN_NAME, OS_REGION_NAME,
# OS_IDENTITY_API_VERSION=3); the chart injects them with envFrom. See
# deploy/secret/openstack-credentials.example.yaml and docs/credentials.md.
openstack:
  secretName: ""                # Secret whose keys are the OS_* env vars

# --- SSH key (Configure/Drain delivery) -------------------------------------
# Configure/Drain reach the instance over SSH to deliver the secret-bearing
# bootstrap blob and to cordon/drain. Provide the private key in a Secret; the
# OpenStack keypair (ovh.keyName) injects the matching public key at create.
# When unset, Configure cannot deliver the bootstrap blob.
ssh:
  secretName: ""                # Secret holding the SSH private key
  secretKey: id_ed25519
  user: ubuntu                  # --ssh-user (the base image's default cloud user)

# --- offerings --------------------------------------------------------------
# When content is set, it is rendered into a ConfigMap, mounted, and passed via
# --offerings. Use --set-file offerings.content=offerings.json on install.
offerings:
  content: ""

# Optional generic pre-binding cloud-init baked into the server create user_data
# (--base-user-data). Same mechanism as offerings: set content to enable.
baseUserData:
  content: ""

# --- background loops -------------------------------------------------------
reconcileInterval: 2m           # --reconcile-interval

# --- durable state ----------------------------------------------------------
# When enabled, --state points at a file on a PersistentVolume so fence marks,
# the idempotency map, inventory, and bindings survive restarts.
state:
  enabled: false
  path: /var/lib/bigfleet-ovhcloud/state.json
  persistence:
    enabled: false
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi

# --- TLS / mTLS -------------------------------------------------------------
# Provide a Secret with tls.crt + tls.key (and optionally ca.crt for mTLS).
# When ca.crt is present the provider requires + verifies client certs (mTLS).
tls:
  enabled: false
  secretName: ""                 # Secret holding tls.crt, tls.key, [ca.crt]
  mtls: false                   # mount ca.crt and pass --tls-ca

# --- gRPC reflection (--reflection) -----------------------------------------
reflection: true

# Extra raw flags appended verbatim to the args.
extraArgs: []

# --- ServiceAccount ---------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}

# --- Service ----------------------------------------------------------------
service:
  type: ClusterIP
  annotations: {}

# Scrape annotations added to the Service for the metrics port.
metrics:
  prometheusScrape: true

# --- pod scheduling / resources ---------------------------------------------
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: "1"
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}

# Hardened defaults to match the distroless/static:nonroot image.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
