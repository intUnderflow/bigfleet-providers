# Example Secret wiring for the BigFleet OVHcloud Public Cloud provider.
#
# OVH Public Cloud is OpenStack. The provider authenticates with an OpenStack
# USER scoped to ONE Public Cloud project, using the standard OS_* environment
# (Keystone v3), read by gophercloud. This is the OVH analogue of an AWS IAM role:
# instead of a role + policy + trust, you create a project-scoped user (OVH
# Manager -> Public Cloud -> Users / OpenStack, or `openstack user create`), grant
# it the minimum Compute/Network roles, and store its credentials here.
#
# The chart injects every key in this Secret as an env var (envFrom.secretRef),
# so the keys MUST be the OS_* variable names. DO NOT commit real credentials.
# Prefer creating the Secret imperatively from an openrc file, or have an external
# secrets operator (External Secrets Operator, Vault) populate the same name:
#
#   # from a downloaded OpenStack RC v3 file (strip `export `, drop the prompt):
#   kubectl -n bigfleet create secret generic bigfleet-ovh-gra-os \
#     --from-literal=OS_AUTH_URL=https://auth.cloud.ovh.net/v3 \
#     --from-literal=OS_IDENTITY_API_VERSION=3 \
#     --from-literal=OS_USERNAME=user-xxxxxxxx \
#     --from-literal=OS_PASSWORD='REPLACE' \
#     --from-literal=OS_PROJECT_ID=REPLACE_PROJECT_ID \
#     --from-literal=OS_PROJECT_DOMAIN_NAME=Default \
#     --from-literal=OS_USER_DOMAIN_NAME=Default \
#     --from-literal=OS_REGION_NAME=GRA
#
# Use ONE user per project; one provider process per region of that project.
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-ovh-gra-os
  namespace: bigfleet
type: Opaque
stringData:
  OS_AUTH_URL: "https://auth.cloud.ovh.net/v3"
  OS_IDENTITY_API_VERSION: "3"
  # Keystone v3 user scoped to the Public Cloud project. Replace before apply.
  OS_USERNAME: "REPLACE_WITH_OS_USERNAME"
  OS_PASSWORD: "REPLACE_WITH_OS_PASSWORD"
  OS_PROJECT_ID: "REPLACE_WITH_PROJECT_ID"
  OS_PROJECT_DOMAIN_NAME: "Default"
  OS_USER_DOMAIN_NAME: "Default"
  # Region this release serves; must match --region / .Values.region.
  OS_REGION_NAME: "GRA"
---
# The SSH private key the provider uses to deliver the per-cluster bootstrap blob
# and to cordon/drain. The matching PUBLIC key is injected at instance create via
# the OpenStack keypair named in ovh.keyName (`openstack keypair create`). Create
# the Secret imperatively:
#
#   kubectl -n bigfleet create secret generic bigfleet-ovh-ssh \
#     --from-file=id_ed25519=./id_ed25519
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-ovh-ssh
  namespace: bigfleet
type: Opaque
stringData:
  # The SSH private key (PEM/OpenSSH). Replace before apply, or use --from-file.
  id_ed25519: "REPLACE_WITH_SSH_PRIVATE_KEY"
