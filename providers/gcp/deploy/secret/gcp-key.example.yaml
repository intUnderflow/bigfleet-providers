# Off-GKE fallback: a service-account KEY FILE as a Kubernetes Secret.
#
# PREFER WORKLOAD IDENTITY ON GKE — it needs no key file at all (see
# providers/gcp/docs/credentials.md). Use this only when Workload Identity is not
# available. A key file is a long-lived credential that can create and delete
# every instance in the project; protect and rotate it.
#
# Create it from a real key instead of editing this file by hand:
#
#   gcloud iam service-accounts keys create key.json \
#     --iam-account bigfleet-gcp@my-project.iam.gserviceaccount.com
#   kubectl -n bigfleet create secret generic bigfleet-gcp-key --from-file=key.json
#
# Then wire the chart:
#
#   credentials:
#     secretName: bigfleet-gcp-key   # mounted at /var/secrets/google/key.json
#                                    # GOOGLE_APPLICATION_CREDENTIALS is set for you
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-gcp-key
  namespace: bigfleet
type: Opaque
stringData:
  # Replace with the full JSON key for the PROVIDER service account.
  key.json: |
    {
      "type": "service_account",
      "project_id": "REPLACE_ME",
      "private_key_id": "REPLACE_ME",
      "private_key": "-----BEGIN PRIVATE KEY-----\nREPLACE_ME\n-----END PRIVATE KEY-----\n",
      "client_email": "bigfleet-gcp@REPLACE_ME.iam.gserviceaccount.com",
      "client_id": "REPLACE_ME",
      "token_uri": "https://oauth2.googleapis.com/token"
    }
