apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bigfleet-gcp.fullname" . }}
  labels:
    {{- include "bigfleet-gcp.labels" . | nindent 4 }}
spec:
  # One process per region: do not scale this beyond 1.
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "bigfleet-gcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bigfleet-gcp.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- if .Values.offerings.content }}
        checksum/offerings: {{ .Values.offerings.content | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "bigfleet-gcp.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: gcp
          image: {{ include "bigfleet-gcp.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - --addr=:{{ .Values.ports.grpc }}
            - --metrics-addr=:{{ .Values.ports.metrics }}
            {{- if .Values.project }}
            - --project={{ .Values.project }}
            {{- end }}
            {{- if .Values.region }}
            - --region={{ .Values.region }}
            {{- end }}
            {{- if .Values.provider }}
            - --provider={{ .Values.provider }}
            {{- end }}
            - --gcp-backend={{ .Values.gcpBackend }}
            - --reflection={{ .Values.reflection }}
            - --reconcile-interval={{ .Values.reconcileInterval }}
            {{- if .Values.gce.image }}
            - --image={{ .Values.gce.image }}
            {{- end }}
            {{- if .Values.gce.network }}
            - --network={{ .Values.gce.network }}
            {{- end }}
            {{- if .Values.gce.subnetwork }}
            - --subnetwork={{ .Values.gce.subnetwork }}
            {{- end }}
            - --disk-size-gb={{ .Values.gce.diskSizeGb }}
            {{- if .Values.gce.instanceServiceAccount }}
            - --instance-service-account={{ .Values.gce.instanceServiceAccount }}
            {{- end }}
            - --bootstrap-hook={{ .Values.gce.bootstrapHook }}
            - --use-external-ip={{ .Values.gce.useExternalIP }}
            {{- if .Values.ssh.secretName }}
            - --ssh-key=/etc/bigfleet/ssh/id_ed25519
            - --ssh-user={{ .Values.ssh.user }}
            {{- end }}
            {{- if .Values.gce.zoneA }}
            - --zone-a={{ .Values.gce.zoneA }}
            {{- end }}
            {{- if .Values.gce.zoneB }}
            - --zone-b={{ .Values.gce.zoneB }}
            {{- end }}
            - --seed-count={{ .Values.gce.seedCount }}
            {{- if .Values.offerings.content }}
            - --offerings=/etc/bigfleet/offerings/offerings.json
            {{- end }}
            {{- if .Values.baseStartupScript.content }}
            - --base-startup-script=/etc/bigfleet/startup/base-startup-script
            {{- end }}
            {{- if .Values.state.enabled }}
            - --state={{ .Values.state.path }}
            {{- end }}
            {{- if .Values.tls.enabled }}
            - --tls-cert=/etc/bigfleet/tls/tls.crt
            - --tls-key=/etc/bigfleet/tls/tls.key
            {{- if .Values.tls.mtls }}
            - --tls-ca=/etc/bigfleet/tls/ca.crt
            {{- end }}
            {{- end }}
            {{- with .Values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.credentials.secretName }}
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/google/{{ .Values.credentials.key }}
          {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.ports.grpc }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.ports.metrics }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.offerings.content }}
            - name: offerings
              mountPath: /etc/bigfleet/offerings
              readOnly: true
            {{- end }}
            {{- if .Values.baseStartupScript.content }}
            - name: startup
              mountPath: /etc/bigfleet/startup
              readOnly: true
            {{- end }}
            {{- if .Values.credentials.secretName }}
            - name: gcp-key
              mountPath: /var/secrets/google
              readOnly: true
            {{- end }}
            {{- if .Values.ssh.secretName }}
            - name: ssh-key
              mountPath: /etc/bigfleet/ssh
              readOnly: true
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /etc/bigfleet/tls
              readOnly: true
            {{- end }}
            {{- if .Values.state.enabled }}
            - name: state
              mountPath: {{ dir .Values.state.path }}
            {{- end }}
      volumes:
        {{- if .Values.offerings.content }}
        - name: offerings
          configMap:
            name: {{ include "bigfleet-gcp.fullname" . }}-offerings
        {{- end }}
        {{- if .Values.baseStartupScript.content }}
        - name: startup
          configMap:
            name: {{ include "bigfleet-gcp.fullname" . }}-startup
        {{- end }}
        {{- if .Values.credentials.secretName }}
        - name: gcp-key
          secret:
            secretName: {{ .Values.credentials.secretName }}
        {{- end }}
        {{- if .Values.ssh.secretName }}
        - name: ssh-key
          secret:
            secretName: {{ .Values.ssh.secretName }}
            defaultMode: 0400
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- end }}
        {{- if .Values.state.enabled }}
        - name: state
          {{- if .Values.state.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "bigfleet-gcp.fullname" . }}-state
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
