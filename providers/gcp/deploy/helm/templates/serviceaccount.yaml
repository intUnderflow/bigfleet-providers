{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "bigfleet-gcp.serviceAccountName" . }}
  labels:
    {{- include "bigfleet-gcp.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.serviceAccount.gcpServiceAccount }}
    # Workload Identity: the GKE analogue of IRSA — bind this Kubernetes SA to
    # the provider's least-privilege Google service account (from deploy/sa), so
    # the pod impersonates it with no key file.
    iam.gke.io/gcp-service-account: {{ .Values.serviceAccount.gcpServiceAccount | quote }}
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end -}}
