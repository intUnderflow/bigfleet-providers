# Example Secret wiring for the BigFleet UpCloud provider.
#
# UpCloud has no IAM/role chain — the authorisation surface is an API SUB-ACCOUNT
# (username + password used for HTTP Basic auth). This is the UpCloud analogue of
# an AWS IAM role: instead of a role + policy + trust, you create a DEDICATED,
# API-scoped sub-account in the UpCloud Control Panel (People -> add a user,
# enable API access, and DISABLE Control Panel/console login), store its
# credentials here, and the chart mounts them as the UPCLOUD_USERNAME /
# UPCLOUD_PASSWORD env vars.
#
# Use a dedicated sub-account, NOT your main account credentials. Rotate it by
# changing the sub-account password in the Control Panel and updating this Secret.
#
# DO NOT commit real credentials. Prefer creating the Secret imperatively:
#
#   kubectl -n bigfleet create secret generic bigfleet-upcloud-credentials \
#     --from-literal=username="$UPCLOUD_USERNAME" \
#     --from-literal=password="$UPCLOUD_PASSWORD"
#
# ...or have an external secrets operator (External Secrets Operator, Vault)
# populate the same name/keys. The chart only needs the Secret to exist.
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-upcloud-credentials
  namespace: bigfleet
type: Opaque
stringData:
  # An API-scoped UpCloud sub-account. Replace before apply.
  username: "REPLACE_WITH_UPCLOUD_API_USERNAME"
  password: "REPLACE_WITH_UPCLOUD_API_PASSWORD"
---
# The SSH private key the provider uses to deliver the bootstrap blob and run the
# drain over SSH. Its matching public key is injected into every server at create
# (chart value ssh.publicKey), and the server's host key is verified against a
# fingerprint pinned at create. Create it from a dedicated keypair:
#
#   ssh-keygen -t ed25519 -N '' -f bigfleet-upcloud
#   kubectl -n bigfleet create secret generic bigfleet-upcloud-ssh \
#     --from-file=id=./bigfleet-upcloud
#
# Then pass the public key to the chart:
#   --set ssh.publicKey="$(cat bigfleet-upcloud.pub)"
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-upcloud-ssh
  namespace: bigfleet
type: Opaque
stringData:
  # An OpenSSH private key (PEM). Replace before apply, or create with ssh-keygen.
  id: "REPLACE_WITH_OPENSSH_PRIVATE_KEY_PEM"
---
# Optional: the TLS server certificate for the gRPC listener (shard <-> provider).
# When ca.crt is present the provider requires + verifies client certs (mTLS).
# Create it from your PKI (cert-manager, an internal CA, etc.):
#
#   kubectl -n bigfleet create secret generic bigfleet-upcloud-tls \
#     --from-file=tls.crt=./provider.crt \
#     --from-file=tls.key=./provider.key \
#     --from-file=ca.crt=./client-ca.crt
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-upcloud-tls
  namespace: bigfleet
type: Opaque
stringData:
  tls.crt: "REPLACE_WITH_PROVIDER_SERVER_CERT_PEM"
  tls.key: "REPLACE_WITH_PROVIDER_SERVER_KEY_PEM"
  ca.crt: "REPLACE_WITH_CLIENT_CA_PEM"
