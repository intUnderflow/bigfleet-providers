# Example Secret wiring for the BigFleet DigitalOcean provider.
#
# DigitalOcean has no IAM/role chain — the entire authorisation surface is a
# single Personal Access Token (PAT). This is the DigitalOcean analogue of an AWS
# IAM role: instead of a role + policy + trust, you mint one read+write Droplet
# PAT in the DigitalOcean control panel (API -> Tokens -> Generate New Token), or
# with `doctl auth init`, store it here, and the chart mounts it as the
# DIGITALOCEAN_TOKEN env var.
#
# Scope it to the MINIMUM: read + write on Droplets (the provider also reads the
# Sizes catalogue and writes Droplet Tags). Do NOT grant account/billing scope.
#
# DO NOT commit a real token. Prefer creating the Secret imperatively:
#
#   kubectl -n bigfleet create secret generic bigfleet-digitalocean-token \
#     --from-literal=token="$DIGITALOCEAN_TOKEN"
#
# ...or generate it from this template with the value substituted at apply time,
# or have an external secrets operator (External Secrets Operator, Vault) populate
# the same name/key. The chart only needs the Secret to exist.
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-digitalocean-token
  namespace: bigfleet
type: Opaque
stringData:
  # A read+write-Droplets-scoped DigitalOcean Personal Access Token. Replace
  # before apply.
  token: "REPLACE_WITH_DIGITALOCEAN_TOKEN"
---
# The HMAC secret that mints the per-machine agent bearer tokens for the on-host
# bootstrap channel. Pin a fixed value so already-issued agent tokens survive a
# provider restart (a random per-process secret would invalidate them). Mounted
# as BIGFLEET_BOOTSTRAP_SECRET. Create it imperatively:
#
#   kubectl -n bigfleet create secret generic bigfleet-digitalocean-bootstrap \
#     --from-literal=secret="$(openssl rand -hex 32)"
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-digitalocean-bootstrap
  namespace: bigfleet
type: Opaque
stringData:
  # A long random HMAC key. Replace before apply, or create with openssl rand.
  secret: "REPLACE_WITH_RANDOM_HMAC_SECRET"
---
# The TLS server certificate for the on-host agent bootstrap channel. The on-host
# agent pins ca.crt to verify the provider; the provider presents tls.crt/tls.key.
# Create it from your PKI (cert-manager, an internal CA, etc.):
#
#   kubectl -n bigfleet create secret generic bigfleet-digitalocean-bootstrap-tls \
#     --from-file=tls.crt=./bootstrap.crt \
#     --from-file=tls.key=./bootstrap.key \
#     --from-file=ca.crt=./bootstrap-ca.crt
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-digitalocean-bootstrap-tls
  namespace: bigfleet
type: Opaque
stringData:
  tls.crt: "REPLACE_WITH_BOOTSTRAP_SERVER_CERT_PEM"
  tls.key: "REPLACE_WITH_BOOTSTRAP_SERVER_KEY_PEM"
  ca.crt: "REPLACE_WITH_BOOTSTRAP_CA_PEM"
