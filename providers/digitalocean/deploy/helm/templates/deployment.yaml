apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bigfleet-digitalocean.fullname" . }}
  labels:
    {{- include "bigfleet-digitalocean.labels" . | nindent 4 }}
spec:
  # One process per region: do not scale this beyond 1.
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "bigfleet-digitalocean.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bigfleet-digitalocean.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- if .Values.offerings.content }}
        checksum/offerings: {{ .Values.offerings.content | sha256sum }}
        {{- end }}
        {{- if .Values.baseUserData.content }}
        checksum/base-user-data: {{ .Values.baseUserData.content | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "bigfleet-digitalocean.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: digitalocean
          image: {{ include "bigfleet-digitalocean.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - --addr=:{{ .Values.ports.grpc }}
            - --metrics-addr=:{{ .Values.ports.metrics }}
            {{- if .Values.provider }}
            - --provider={{ .Values.provider }}
            {{- end }}
            - --do-backend={{ .Values.doBackend }}
            - --reflection={{ .Values.reflection }}
            - --price-refresh={{ .Values.priceRefresh }}
            - --reconcile-interval={{ .Values.reconcileInterval }}
            {{- if .Values.region }}
            - --region={{ .Values.region }}
            - --region-a={{ .Values.region }}
            {{- end }}
            {{- if .Values.regionB }}
            - --region-b={{ .Values.regionB }}
            {{- end }}
            {{- if .Values.digitalocean.image }}
            - --image={{ .Values.digitalocean.image }}
            {{- end }}
            - --seed-count={{ .Values.digitalocean.seedCount }}
            {{- if .Values.bootstrap.enabled }}
            - --bootstrap-addr=:{{ .Values.ports.bootstrap }}
            - --bootstrap-endpoint={{ required "bootstrap.endpoint is required when bootstrap.enabled=true (the externally-reachable URL the on-host agent dials)" .Values.bootstrap.endpoint }}
            - --bootstrap-tls-cert=/etc/bigfleet/bootstrap-tls/tls.crt
            - --bootstrap-tls-key=/etc/bigfleet/bootstrap-tls/tls.key
            {{- if .Values.bootstrap.ca }}
            - --bootstrap-ca=/etc/bigfleet/bootstrap-tls/ca.crt
            {{- end }}
            {{- end }}
            {{- if .Values.offerings.content }}
            - --offerings=/etc/bigfleet/offerings/offerings.json
            {{- end }}
            {{- if .Values.baseUserData.content }}
            - --base-user-data=/etc/bigfleet/base-user-data/base-user-data
            {{- end }}
            {{- if .Values.state.enabled }}
            - --state={{ .Values.state.path }}
            {{- end }}
            {{- if .Values.tls.enabled }}
            - --tls-cert=/etc/bigfleet/tls/tls.crt
            - --tls-key=/etc/bigfleet/tls/tls.key
            {{- if .Values.tls.mtls }}
            - --tls-ca=/etc/bigfleet/tls/ca.crt
            {{- end }}
            {{- end }}
            {{- with .Values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            {{- if .Values.token.secretName }}
            - name: DIGITALOCEAN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.token.secretName }}
                  key: {{ .Values.token.secretKey }}
            {{- end }}
            {{- if .Values.bootstrap.enabled }}
            - name: BIGFLEET_BOOTSTRAP_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ required "bootstrap.secretName is required when bootstrap.enabled=true (Secret with the HMAC key that mints per-machine agent tokens)" .Values.bootstrap.secretName }}
                  key: {{ .Values.bootstrap.secretKey }}
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.ports.grpc }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.ports.metrics }}
              protocol: TCP
            {{- if .Values.bootstrap.enabled }}
            - name: bootstrap
              containerPort: {{ .Values.ports.bootstrap }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.bootstrap.enabled }}
            - name: bootstrap-tls
              mountPath: /etc/bigfleet/bootstrap-tls
              readOnly: true
            {{- end }}
            {{- if .Values.offerings.content }}
            - name: offerings
              mountPath: /etc/bigfleet/offerings
              readOnly: true
            {{- end }}
            {{- if .Values.baseUserData.content }}
            - name: base-user-data
              mountPath: /etc/bigfleet/base-user-data
              readOnly: true
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /etc/bigfleet/tls
              readOnly: true
            {{- end }}
            {{- if .Values.state.enabled }}
            - name: state
              mountPath: {{ dir .Values.state.path }}
            {{- end }}
      volumes:
        {{- if .Values.bootstrap.enabled }}
        - name: bootstrap-tls
          secret:
            secretName: {{ required "bootstrap.tlsSecretName is required when bootstrap.enabled=true (Secret with tls.crt/tls.key for the channel)" .Values.bootstrap.tlsSecretName }}
            defaultMode: 0400
        {{- end }}
        {{- if .Values.offerings.content }}
        - name: offerings
          configMap:
            name: {{ include "bigfleet-digitalocean.fullname" . }}-offerings
        {{- end }}
        {{- if .Values.baseUserData.content }}
        - name: base-user-data
          configMap:
            name: {{ include "bigfleet-digitalocean.fullname" . }}-base-user-data
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- end }}
        {{- if .Values.state.enabled }}
        - name: state
          {{- if .Values.state.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "bigfleet-digitalocean.fullname" . }}-state
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
