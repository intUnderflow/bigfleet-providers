# Example Secret wiring for the BigFleet Latitude.sh provider.
#
# Latitude.sh has no IAM/role model — the entire authorisation surface is a
# single project-scoped API token plus the project id/slug it is used against.
# This is the Latitude analogue of an AWS IAM role: instead of a role + policy +
# trust, you mint one API token in the Latitude.sh dashboard (Settings -> API
# Keys), scope your work to a project, store the token here, and the chart mounts
# it as the LATITUDESH_API_TOKEN env var.
#
# DO NOT commit a real token. Prefer creating the Secret imperatively:
#
#   kubectl -n bigfleet create secret generic bigfleet-latitude-token \
#     --from-literal=token="$LATITUDESH_API_TOKEN"
#
# ...or have an external secrets operator (External Secrets Operator, Vault)
# populate the same name/key. The chart only needs the Secret to exist.
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-latitude-token
  namespace: bigfleet
type: Opaque
stringData:
  # A project-scoped Latitude.sh API token. Replace before apply.
  token: "REPLACE_WITH_LATITUDESH_API_TOKEN"
---
# The SSH private key the provider uses to deliver the per-cluster bootstrap blob
# (the cluster-join SECRET) and to cordon/drain — over SSH on the host key pinned
# at deploy. The provider injects a generated host key via first-boot user_data
# and authorises THIS key's public half on every server it deploys. Create it
# imperatively:
#
#   kubectl -n bigfleet create secret generic bigfleet-latitude-ssh \
#     --from-file=id_ed25519=./id_ed25519
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-latitude-ssh
  namespace: bigfleet
type: Opaque
stringData:
  # The SSH private key (PEM/OpenSSH). Replace before apply, or use --from-file.
  id_ed25519: "REPLACE_WITH_SSH_PRIVATE_KEY"
