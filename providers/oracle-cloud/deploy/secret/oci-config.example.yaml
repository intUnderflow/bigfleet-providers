# Example Secret wiring for the BigFleet OCI provider's config-file / API-key auth.
#
# PREFER Instance Principals (provider on an OCI instance) or OKE Workload Identity
# (provider as an OKE pod) — neither needs key files; the principal's identity comes
# from the dynamic group + policy in deploy/iam. Use this config-file path ONLY for
# clusters that are not OKE / cannot use those (set oci.auth=config_file and
# credentials.useConfigFile=true in the Helm values).
#
# The Secret mounts a standard ~/.oci/config plus its referenced signing key. The
# chart mounts it read-only at /home/nonroot/.oci and points OCI_CONFIG_FILE at it.
#
# DO NOT commit a real key. Prefer creating the Secret imperatively from a working
# ~/.oci directory:
#
#   kubectl -n bigfleet create secret generic bigfleet-oci-config \
#     --from-file=config=$HOME/.oci/config \
#     --from-file=oci_api_key.pem=$HOME/.oci/oci_api_key.pem
#
# ...or have an external secrets operator (External Secrets Operator, OCI Vault)
# populate the same name/keys. The 'config' file's key_file must point at the
# mounted key path, e.g. key_file=/home/nonroot/.oci/oci_api_key.pem
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-oci-config
  namespace: bigfleet
type: Opaque
stringData:
  config: |
    [DEFAULT]
    user=ocid1.user.oc1..REPLACE
    fingerprint=REPLACE:FINGERPRINT
    tenancy=ocid1.tenancy.oc1..REPLACE
    region=eu-frankfurt-1
    key_file=/home/nonroot/.oci/oci_api_key.pem
  # The PEM API signing key referenced by key_file above. Replace before apply,
  # or use --from-file as shown in the comment.
  oci_api_key.pem: "REPLACE_WITH_PEM_PRIVATE_KEY"
