apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bigfleet-oracle-cloud.fullname" . }}
  labels:
    {{- include "bigfleet-oracle-cloud.labels" . | nindent 4 }}
spec:
  # One process per region: do not scale this beyond 1.
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "bigfleet-oracle-cloud.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bigfleet-oracle-cloud.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- if .Values.offerings.content }}
        checksum/offerings: {{ .Values.offerings.content | sha256sum }}
        {{- end }}
        {{- if .Values.baseUserData.content }}
        checksum/base-user-data: {{ .Values.baseUserData.content | sha256sum }}
        {{- end }}
        {{- if .Values.prices.content }}
        checksum/prices: {{ .Values.prices.content | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "bigfleet-oracle-cloud.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: oracle-cloud
          image: {{ include "bigfleet-oracle-cloud.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - --addr=:{{ .Values.ports.grpc }}
            - --metrics-addr=:{{ .Values.ports.metrics }}
            {{- if .Values.provider }}
            - --provider={{ .Values.provider }}
            {{- end }}
            - --oci-backend={{ .Values.ociBackend }}
            - --reflection={{ .Values.reflection }}
            - --reconcile-interval={{ .Values.reconcileInterval }}
            {{- if .Values.region }}
            - --region={{ .Values.region }}
            {{- end }}
            {{- if .Values.oci.compartment }}
            - --compartment={{ .Values.oci.compartment }}
            {{- end }}
            {{- if .Values.oci.subnet }}
            - --subnet={{ .Values.oci.subnet }}
            {{- end }}
            {{- if .Values.oci.image }}
            - --image={{ .Values.oci.image }}
            {{- end }}
            - --auth={{ .Values.oci.auth }}
            - --bootstrap-hook={{ .Values.oci.bootstrapHook }}
            - --seed-count={{ .Values.oci.seedCount }}
            {{- if .Values.oci.adA }}
            - --ad-a={{ .Values.oci.adA }}
            {{- end }}
            {{- if .Values.oci.adB }}
            - --ad-b={{ .Values.oci.adB }}
            {{- end }}
            {{- if .Values.offerings.content }}
            - --offerings=/etc/bigfleet/offerings/offerings.json
            {{- end }}
            {{- if .Values.baseUserData.content }}
            - --base-user-data=/etc/bigfleet/base-user-data/base-user-data
            {{- end }}
            {{- if .Values.prices.content }}
            - --prices-file=/etc/bigfleet/prices/prices.yaml
            {{- end }}
            {{- if .Values.state.enabled }}
            - --state={{ .Values.state.path }}
            {{- end }}
            {{- if .Values.tls.enabled }}
            - --tls-cert=/etc/bigfleet/tls/tls.crt
            - --tls-key=/etc/bigfleet/tls/tls.key
            {{- if .Values.tls.mtls }}
            - --tls-ca=/etc/bigfleet/tls/ca.crt
            {{- end }}
            {{- end }}
            {{- with .Values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.credentials.useConfigFile }}
          env:
            - name: OCI_CONFIG_FILE
              value: /home/nonroot/.oci/config
          {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.ports.grpc }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.ports.metrics }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.credentials.useConfigFile }}
            - name: oci-config
              mountPath: /home/nonroot/.oci
              readOnly: true
            {{- end }}
            {{- if .Values.offerings.content }}
            - name: offerings
              mountPath: /etc/bigfleet/offerings
              readOnly: true
            {{- end }}
            {{- if .Values.baseUserData.content }}
            - name: base-user-data
              mountPath: /etc/bigfleet/base-user-data
              readOnly: true
            {{- end }}
            {{- if .Values.prices.content }}
            - name: prices
              mountPath: /etc/bigfleet/prices
              readOnly: true
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /etc/bigfleet/tls
              readOnly: true
            {{- end }}
            {{- if .Values.state.enabled }}
            - name: state
              mountPath: {{ dir .Values.state.path }}
            {{- end }}
      volumes:
        {{- if .Values.credentials.useConfigFile }}
        - name: oci-config
          secret:
            secretName: {{ .Values.credentials.secretName }}
            defaultMode: 0400
        {{- end }}
        {{- if .Values.offerings.content }}
        - name: offerings
          configMap:
            name: {{ include "bigfleet-oracle-cloud.fullname" . }}-offerings
        {{- end }}
        {{- if .Values.baseUserData.content }}
        - name: base-user-data
          configMap:
            name: {{ include "bigfleet-oracle-cloud.fullname" . }}-base-user-data
        {{- end }}
        {{- if .Values.prices.content }}
        - name: prices
          configMap:
            name: {{ include "bigfleet-oracle-cloud.fullname" . }}-prices
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- end }}
        {{- if .Values.state.enabled }}
        - name: state
          {{- if .Values.state.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "bigfleet-oracle-cloud.fullname" . }}-state
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
