{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "bigfleet-azure.serviceAccountName" . }}
  labels:
    {{- include "bigfleet-azure.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.serviceAccount.clientId }}
    # Workload Identity: federates this ServiceAccount to a user-assigned managed
    # identity (the provider's least-privilege identity from deploy/terraform).
    azure.workload.identity/client-id: {{ .Values.serviceAccount.clientId | quote }}
    {{- end }}
    {{- if .Values.serviceAccount.tenantId }}
    azure.workload.identity/tenant-id: {{ .Values.serviceAccount.tenantId | quote }}
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end -}}
