apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bigfleet-azure.fullname" . }}
  labels:
    {{- include "bigfleet-azure.labels" . | nindent 4 }}
spec:
  # One process per region: do not scale this beyond 1.
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "bigfleet-azure.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bigfleet-azure.selectorLabels" . | nindent 8 }}
        {{- if .Values.workloadIdentity.enabled }}
        azure.workload.identity/use: "true"
        {{- end }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- if .Values.offerings.content }}
        checksum/offerings: {{ .Values.offerings.content | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "bigfleet-azure.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: azure
          image: {{ include "bigfleet-azure.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - --addr=:{{ .Values.ports.grpc }}
            - --metrics-addr=:{{ .Values.ports.metrics }}
            {{- if .Values.location }}
            - --location={{ .Values.location }}
            {{- end }}
            {{- if .Values.provider }}
            - --provider={{ .Values.provider }}
            {{- end }}
            - --azure-backend={{ .Values.azureBackend }}
            - --reflection={{ .Values.reflection }}
            - --price-refresh={{ .Values.priceRefresh }}
            - --reconcile-interval={{ .Values.reconcileInterval }}
            {{- if .Values.evictionToken }}
            - --eviction-token={{ .Values.evictionToken }}
            {{- end }}
            {{- if .Values.azure.subscriptionId }}
            - --subscription-id={{ .Values.azure.subscriptionId }}
            {{- end }}
            {{- if .Values.azure.resourceGroup }}
            - --resource-group={{ .Values.azure.resourceGroup }}
            {{- end }}
            {{- if .Values.azure.subnetId }}
            - --subnet-id={{ .Values.azure.subnetId }}
            {{- end }}
            {{- if .Values.azure.image }}
            - --image={{ .Values.azure.image }}
            {{- end }}
            - --admin-username={{ .Values.azure.adminUsername }}
            {{- if .Values.azure.sshPublicKey }}
            - --ssh-public-key=/etc/bigfleet/ssh/ssh.pub
            {{- end }}
            - --bootstrap-hook={{ .Values.azure.bootstrapHook }}
            {{- if .Values.azure.zoneA }}
            - --zone-a={{ .Values.azure.zoneA }}
            {{- end }}
            {{- if .Values.azure.zoneB }}
            - --zone-b={{ .Values.azure.zoneB }}
            {{- end }}
            - --seed-count={{ .Values.azure.seedCount }}
            {{- if .Values.offerings.content }}
            - --offerings=/etc/bigfleet/offerings/offerings.json
            {{- end }}
            {{- if .Values.baseUserData.content }}
            - --base-user-data=/etc/bigfleet/base-user-data/base-user-data
            {{- end }}
            {{- if .Values.state.enabled }}
            - --state={{ .Values.state.path }}
            {{- end }}
            {{- if .Values.tls.enabled }}
            - --tls-cert=/etc/bigfleet/tls/tls.crt
            - --tls-key=/etc/bigfleet/tls/tls.key
            {{- if .Values.tls.mtls }}
            - --tls-ca=/etc/bigfleet/tls/ca.crt
            {{- end }}
            {{- end }}
            {{- with .Values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.ports.grpc }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.ports.metrics }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.offerings.content }}
            - name: offerings
              mountPath: /etc/bigfleet/offerings
              readOnly: true
            {{- end }}
            {{- if .Values.baseUserData.content }}
            - name: base-user-data
              mountPath: /etc/bigfleet/base-user-data
              readOnly: true
            {{- end }}
            {{- if .Values.azure.sshPublicKey }}
            - name: ssh
              mountPath: /etc/bigfleet/ssh
              readOnly: true
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /etc/bigfleet/tls
              readOnly: true
            {{- end }}
            {{- if .Values.state.enabled }}
            - name: state
              mountPath: {{ dir .Values.state.path }}
            {{- end }}
      volumes:
        {{- if .Values.offerings.content }}
        - name: offerings
          configMap:
            name: {{ include "bigfleet-azure.fullname" . }}-offerings
        {{- end }}
        {{- if .Values.baseUserData.content }}
        - name: base-user-data
          configMap:
            name: {{ include "bigfleet-azure.fullname" . }}-base-user-data
        {{- end }}
        {{- if .Values.azure.sshPublicKey }}
        - name: ssh
          configMap:
            name: {{ include "bigfleet-azure.fullname" . }}-ssh
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- end }}
        {{- if .Values.state.enabled }}
        - name: state
          {{- if .Values.state.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "bigfleet-azure.fullname" . }}-state
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
