apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bigfleet-libvirt.fullname" . }}
  labels:
    {{- include "bigfleet-libvirt.labels" . | nindent 4 }}
spec:
  # One process per libvirt deployment: do not scale this beyond 1.
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "bigfleet-libvirt.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bigfleet-libvirt.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or .Values.offerings.content .Values.instanceTypes.content .Values.baseUserData.content .Values.podAnnotations }}
      annotations:
        {{- if .Values.offerings.content }}
        checksum/offerings: {{ .Values.offerings.content | sha256sum }}
        {{- end }}
        {{- if .Values.instanceTypes.content }}
        checksum/instance-types: {{ .Values.instanceTypes.content | sha256sum }}
        {{- end }}
        {{- if .Values.baseUserData.content }}
        checksum/base-user-data: {{ .Values.baseUserData.content | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "bigfleet-libvirt.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: libvirt
          image: {{ include "bigfleet-libvirt.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - --addr=:{{ .Values.ports.grpc }}
            - --metrics-addr=:{{ .Values.ports.metrics }}
            {{- if .Values.provider }}
            - --provider={{ .Values.provider }}
            {{- end }}
            - --libvirt-backend={{ .Values.libvirtBackend }}
            - --reflection={{ .Values.reflection }}
            - --reconcile-interval={{ .Values.reconcileInterval }}
            {{- if .Values.connect }}
            - --connect={{ .Values.connect }}
            {{- end }}
            - --default-zone={{ .Values.defaultZone }}
            - --capacity-type={{ .Values.capacityType }}
            {{- if .Values.libvirt.image }}
            - --image={{ .Values.libvirt.image }}
            {{- end }}
            - --storage-pool={{ .Values.libvirt.storagePool }}
            - --network={{ .Values.libvirt.network }}
            - --seed-count={{ .Values.libvirt.seedCount }}
            - --price-per-vcpu-hour={{ .Values.pricing.perVCPUHour }}
            - --price-per-gib-hour={{ .Values.pricing.perGiBHour }}
            {{- if .Values.pricing.prices }}
            - --prices={{ .Values.pricing.prices }}
            {{- end }}
            {{- if .Values.instanceTypes.content }}
            - --instance-types=/etc/bigfleet/instance-types/instance-types.json
            {{- end }}
            {{- if .Values.offerings.content }}
            - --offerings=/etc/bigfleet/offerings/offerings.json
            {{- end }}
            {{- if .Values.baseUserData.content }}
            - --base-user-data=/etc/bigfleet/base-user-data/base-user-data
            {{- end }}
            {{- if .Values.state.enabled }}
            - --state={{ .Values.state.path }}
            {{- end }}
            {{- if .Values.tls.enabled }}
            - --tls-cert=/etc/bigfleet/tls/tls.crt
            - --tls-key=/etc/bigfleet/tls/tls.key
            {{- if .Values.tls.mtls }}
            - --tls-ca=/etc/bigfleet/tls/ca.crt
            {{- end }}
            {{- end }}
            {{- with .Values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.ports.grpc }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.ports.metrics }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.credentials.ssh.secretName }}
            - name: libvirt-ssh
              mountPath: /etc/bigfleet/libvirt-ssh
              readOnly: true
            {{- end }}
            {{- if .Values.credentials.tls.secretName }}
            - name: libvirt-tls
              mountPath: /etc/pki/libvirt
              readOnly: true
            {{- end }}
            {{- if .Values.credentials.hostSocket.enabled }}
            - name: libvirt-sock
              mountPath: /var/run/libvirt/libvirt-sock
            {{- end }}
            {{- if .Values.instanceTypes.content }}
            - name: instance-types
              mountPath: /etc/bigfleet/instance-types
              readOnly: true
            {{- end }}
            {{- if .Values.offerings.content }}
            - name: offerings
              mountPath: /etc/bigfleet/offerings
              readOnly: true
            {{- end }}
            {{- if .Values.baseUserData.content }}
            - name: base-user-data
              mountPath: /etc/bigfleet/base-user-data
              readOnly: true
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /etc/bigfleet/tls
              readOnly: true
            {{- end }}
            {{- if .Values.state.enabled }}
            - name: state
              mountPath: {{ dir .Values.state.path }}
            {{- end }}
      volumes:
        {{- if .Values.credentials.ssh.secretName }}
        - name: libvirt-ssh
          secret:
            secretName: {{ .Values.credentials.ssh.secretName }}
            # 0440 (not 0400): Secret files are owned root:fsGroup, and the pod
            # runs non-root (uid 65532), so the key must be group-readable for the
            # process to read it via the fsGroup supplementary group.
            defaultMode: 0440
        {{- end }}
        {{- if .Values.credentials.tls.secretName }}
        - name: libvirt-tls
          secret:
            secretName: {{ .Values.credentials.tls.secretName }}
            defaultMode: 0440
        {{- end }}
        {{- if .Values.credentials.hostSocket.enabled }}
        - name: libvirt-sock
          hostPath:
            path: {{ .Values.credentials.hostSocket.path }}
            type: Socket
        {{- end }}
        {{- if .Values.instanceTypes.content }}
        - name: instance-types
          configMap:
            name: {{ include "bigfleet-libvirt.fullname" . }}-instance-types
        {{- end }}
        {{- if .Values.offerings.content }}
        - name: offerings
          configMap:
            name: {{ include "bigfleet-libvirt.fullname" . }}-offerings
        {{- end }}
        {{- if .Values.baseUserData.content }}
        - name: base-user-data
          configMap:
            name: {{ include "bigfleet-libvirt.fullname" . }}-base-user-data
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- end }}
        {{- if .Values.state.enabled }}
        - name: state
          {{- if .Values.state.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "bigfleet-libvirt.fullname" . }}-state
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
