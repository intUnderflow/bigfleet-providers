# Example credential Secret wiring for the BigFleet libvirt provider.
#
# Unlike a hyperscaler, libvirt has no IAM/role/instance-profile model. The
# authorisation surface is the libvirt CONNECTION itself: how the provider's pod
# reaches each host's libvirtd, and the least-privilege identity it connects as.
# Pick the model that matches your --connect URIs. DO NOT commit real keys.
#
# ---------------------------------------------------------------------------
# Model A — qemu+libssh:// (SSH transport, the common multi-host model)
# ---------------------------------------------------------------------------
# The provider connects to each host over SSH and talks to the local libvirt
# socket. Mount an SSH PRIVATE key; each host authorises the matching PUBLIC key
# for a dedicated, least-privilege libvirt user (see deploy/host-setup/). Create
# it imperatively:
#
#   kubectl -n bigfleet create secret generic bigfleet-libvirt-ssh \
#     --from-file=id_ed25519=./id_ed25519 \
#     --from-file=known_hosts=./known_hosts
#
# Then: credentials.ssh.secretName=bigfleet-libvirt-ssh, and --connect URIs like
#   rack1=qemu+libssh://bigfleet@host-a/system?keyfile=/etc/bigfleet/libvirt-ssh/id_ed25519&known_hosts=/etc/bigfleet/libvirt-ssh/known_hosts&known_hosts_verify=normal
# Use the qemu+libssh:// scheme (not qemu+ssh://): the pinned pure-Go go-libvirt
# accepts the known_hosts host-key-pinning param only on the libssh transport
# (keyfile works on both).
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-libvirt-ssh
  namespace: bigfleet
type: Opaque
stringData:
  # The SSH private key the provider connects with. Replace before apply, or use
  # --from-file. The matching public key must be in the host user's authorized_keys.
  id_ed25519: "REPLACE_WITH_SSH_PRIVATE_KEY"
  # Pinned host keys for the libvirt hosts (ssh-keyscan host-a host-b > known_hosts),
  # so the SSH transport verifies the host and is not vulnerable to MITM.
  known_hosts: "REPLACE_WITH_KNOWN_HOSTS"
---
# ---------------------------------------------------------------------------
# Model B — qemu+tls:// (libvirt native TLS)
# ---------------------------------------------------------------------------
# The provider connects to libvirtd's TLS port (16514) with a libvirt CLIENT
# certificate. Mount the client cert/key + CA; each host's libvirtd is configured
# with tls_allowed_dn_list scoped to this client's DN. Create it with:
#
#   kubectl -n bigfleet create secret generic bigfleet-libvirt-tls \
#     --from-file=clientcert.pem=./clientcert.pem \
#     --from-file=clientkey.pem=./clientkey.pem \
#     --from-file=cacert.pem=./cacert.pem
#
# Then: credentials.tls.secretName=bigfleet-libvirt-tls, and --connect URIs like
#   rack1=qemu+tls://host-a/system?pkipath=/etc/bigfleet/libvirt-tls
# (the ?pkipath= points go-libvirt's TLS dialer at the flat mount holding all
# three pems; without it the dialer looks in /etc/pki/libvirt/{,private/} + /etc/pki/CA/).
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-libvirt-tls
  namespace: bigfleet
type: Opaque
stringData:
  clientcert.pem: "REPLACE_WITH_LIBVIRT_CLIENT_CERT"
  clientkey.pem: "REPLACE_WITH_LIBVIRT_CLIENT_KEY"
  cacert.pem: "REPLACE_WITH_LIBVIRT_CA_CERT"
---
# ---------------------------------------------------------------------------
# gRPC mTLS — the listener BigFleet dials (separate from the libvirt connection)
# ---------------------------------------------------------------------------
# Secures the provider's own gRPC port so only authorised shards connect. Keys:
# tls.crt, tls.key, and (for mTLS) ca.crt. Wire with tls.enabled / tls.mtls.
#
#   kubectl -n bigfleet create secret tls bigfleet-libvirt-tls-grpc \
#     --cert=server.pem --key=server-key.pem
#   # then add ca.crt (the client CA) to that Secret for mTLS.
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-libvirt-tls-grpc
  namespace: bigfleet
type: kubernetes.io/tls
stringData:
  tls.crt: "REPLACE_WITH_GRPC_SERVER_CERT"
  tls.key: "REPLACE_WITH_GRPC_SERVER_KEY"
  ca.crt: "REPLACE_WITH_SHARD_CLIENT_CA"   # only needed for mTLS (tls.mtls=true)
