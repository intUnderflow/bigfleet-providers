apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bigfleet-proxmox.fullname" . }}
  labels:
    {{- include "bigfleet-proxmox.labels" . | nindent 4 }}
spec:
  # One process per Proxmox cluster: do not scale this beyond 1.
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "bigfleet-proxmox.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bigfleet-proxmox.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or .Values.offerings.content .Values.instanceTypes.content .Values.podAnnotations }}
      annotations:
        {{- if .Values.offerings.content }}
        checksum/offerings: {{ .Values.offerings.content | sha256sum }}
        {{- end }}
        {{- if .Values.instanceTypes.content }}
        checksum/instance-types: {{ .Values.instanceTypes.content | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "bigfleet-proxmox.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: proxmox
          image: {{ include "bigfleet-proxmox.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - --addr=:{{ .Values.ports.grpc }}
            - --metrics-addr=:{{ .Values.ports.metrics }}
            {{- if .Values.provider }}
            - --provider={{ .Values.provider }}
            {{- end }}
            - --proxmox-backend={{ .Values.proxmoxBackend }}
            - --reflection={{ .Values.reflection }}
            - --reconcile-interval={{ .Values.reconcileInterval }}
            {{- if .Values.proxmox.apiURL }}
            - --proxmox-api-url={{ .Values.proxmox.apiURL }}
            {{- end }}
            {{- if .Values.proxmox.tokenID }}
            - --proxmox-token-id={{ .Values.proxmox.tokenID }}
            {{- end }}
            {{- if .Values.credentials.token.secretName }}
            - --proxmox-token-file=/etc/bigfleet/proxmox-token/{{ .Values.credentials.token.secretKey }}
            {{- end }}
            {{- if .Values.credentials.ca.secretName }}
            - --proxmox-ca-file=/etc/bigfleet/proxmox-ca/{{ .Values.credentials.ca.secretKey }}
            {{- else if .Values.proxmox.tlsFingerprint }}
            - --proxmox-tls-fingerprint={{ .Values.proxmox.tlsFingerprint }}
            {{- end }}
            {{- if .Values.proxmox.pool }}
            - --proxmox-pool={{ .Values.proxmox.pool }}
            {{- end }}
            {{- if .Values.proxmox.nodes }}
            - --nodes={{ .Values.proxmox.nodes }}
            {{- end }}
            - --default-zone={{ .Values.defaultZone }}
            - --seed-count={{ .Values.seedCount }}
            - --template-vmid={{ .Values.proxmox.templateVMID }}
            - --price-per-vcpu-hour={{ .Values.pricing.perVCPUHour }}
            - --price-per-gib-hour={{ .Values.pricing.perGiBHour }}
            {{- if .Values.pricing.prices }}
            - --prices={{ .Values.pricing.prices }}
            {{- end }}
            {{- if .Values.bootstrap.path }}
            - --bootstrap-path={{ .Values.bootstrap.path }}
            {{- end }}
            {{- if .Values.bootstrap.exec }}
            - --bootstrap-exec={{ .Values.bootstrap.exec }}
            {{- end }}
            {{- if .Values.instanceTypes.content }}
            - --instance-types=/etc/bigfleet/instance-types/instance-types.json
            {{- end }}
            {{- if .Values.offerings.content }}
            - --offerings=/etc/bigfleet/offerings/offerings.json
            {{- end }}
            {{- if .Values.state.enabled }}
            - --state={{ .Values.state.path }}
            {{- end }}
            {{- if .Values.tls.enabled }}
            - --tls-cert=/etc/bigfleet/tls/tls.crt
            - --tls-key=/etc/bigfleet/tls/tls.key
            {{- if .Values.tls.mtls }}
            - --tls-ca=/etc/bigfleet/tls/ca.crt
            {{- end }}
            {{- end }}
            {{- with .Values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.ports.grpc }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.ports.metrics }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.credentials.token.secretName }}
            - name: proxmox-token
              mountPath: /etc/bigfleet/proxmox-token
              readOnly: true
            {{- end }}
            {{- if .Values.credentials.ca.secretName }}
            - name: proxmox-ca
              mountPath: /etc/bigfleet/proxmox-ca
              readOnly: true
            {{- end }}
            {{- if .Values.instanceTypes.content }}
            - name: instance-types
              mountPath: /etc/bigfleet/instance-types
              readOnly: true
            {{- end }}
            {{- if .Values.offerings.content }}
            - name: offerings
              mountPath: /etc/bigfleet/offerings
              readOnly: true
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /etc/bigfleet/tls
              readOnly: true
            {{- end }}
            {{- if .Values.state.enabled }}
            - name: state
              mountPath: {{ dir .Values.state.path }}
            {{- end }}
      volumes:
        {{- if .Values.credentials.token.secretName }}
        - name: proxmox-token
          secret:
            secretName: {{ .Values.credentials.token.secretName }}
            defaultMode: 0440
        {{- end }}
        {{- if .Values.credentials.ca.secretName }}
        - name: proxmox-ca
          secret:
            secretName: {{ .Values.credentials.ca.secretName }}
            defaultMode: 0444
        {{- end }}
        {{- if .Values.instanceTypes.content }}
        - name: instance-types
          configMap:
            name: {{ include "bigfleet-proxmox.fullname" . }}-instance-types
        {{- end }}
        {{- if .Values.offerings.content }}
        - name: offerings
          configMap:
            name: {{ include "bigfleet-proxmox.fullname" . }}-offerings
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- end }}
        {{- if .Values.state.enabled }}
        - name: state
          {{- if .Values.state.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "bigfleet-proxmox.fullname" . }}-state
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
