# Example Kubernetes Secrets for the BigFleet Proxmox provider.
#
# The provider authenticates to the Proxmox API with an API token over VERIFIED
# TLS. Two Secrets back this:
#
#   1. the API token SECRET (the UUID half of USER@REALM!TOKENID=SECRET), and
#   2. the Proxmox cluster CA PEM that verifies the API's TLS certificate.
#
# Create them out-of-band (do NOT commit real secrets). The token id itself
# (USER@REALM!TOKENID) is non-secret and is set with --proxmox-token-id /
# proxmox.tokenID; only the secret half lives in the Secret below.
#
# Generate the token + role + pool on the Proxmox host first — see
# ../host-setup/setup-token.sh.
---
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-proxmox-token
type: Opaque
stringData:
  # The token secret (UUID) printed by `pveum user token add ...`.
  token: "00000000-0000-0000-0000-000000000000"
---
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-proxmox-ca
type: Opaque
stringData:
  # The Proxmox cluster CA, copied from a cluster node at
  #   /etc/pve/pve-root-ca.pem
  # This verifies the API's (typically self-signed) TLS certificate. TLS
  # verification is mandatory and there is no skip-verify option; alternatively
  # pin proxmox.tlsFingerprint instead of mounting this CA.
  ca.pem: |
    -----BEGIN CERTIFICATE-----
    ...the contents of /etc/pve/pve-root-ca.pem...
    -----END CERTIFICATE-----
