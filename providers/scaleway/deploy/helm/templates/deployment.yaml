apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bigfleet-scaleway.fullname" . }}
  labels:
    {{- include "bigfleet-scaleway.labels" . | nindent 4 }}
spec:
  # One process per region/zone: do not scale this beyond 1.
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "bigfleet-scaleway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bigfleet-scaleway.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- if .Values.offerings.content }}
        checksum/offerings: {{ .Values.offerings.content | sha256sum }}
        {{- end }}
        {{- if .Values.baseUserData.content }}
        checksum/base-user-data: {{ .Values.baseUserData.content | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "bigfleet-scaleway.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: scaleway
          image: {{ include "bigfleet-scaleway.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - --addr=:{{ .Values.ports.grpc }}
            - --metrics-addr=:{{ .Values.ports.metrics }}
            {{- if .Values.provider }}
            - --provider={{ .Values.provider }}
            {{- end }}
            - --substrate={{ .Values.substrate }}
            - --scaleway-backend={{ .Values.scalewayBackend }}
            - --reflection={{ .Values.reflection }}
            - --price-refresh={{ .Values.priceRefresh }}
            - --reconcile-interval={{ .Values.reconcileInterval }}
            {{- if .Values.zone }}
            - --zone-a={{ .Values.zone }}
            {{- end }}
            {{- if .Values.zoneB }}
            - --zone-b={{ .Values.zoneB }}
            {{- end }}
            {{- if .Values.scaleway.image }}
            - --image={{ .Values.scaleway.image }}
            {{- end }}
            - --eur-usd={{ .Values.scaleway.eurToUSD }}
            - --seed-count={{ .Values.scaleway.seedCount }}
            {{- if .Values.offerings.content }}
            - --offerings=/etc/bigfleet/offerings/offerings.json
            {{- end }}
            {{- if .Values.baseUserData.content }}
            - --base-user-data=/etc/bigfleet/base-user-data/base-user-data
            {{- end }}
            {{- if .Values.state.enabled }}
            - --state={{ .Values.state.path }}
            {{- end }}
            {{- if .Values.tls.enabled }}
            - --tls-cert=/etc/bigfleet/tls/tls.crt
            - --tls-key=/etc/bigfleet/tls/tls.key
            {{- if .Values.tls.mtls }}
            - --tls-ca=/etc/bigfleet/tls/ca.crt
            {{- end }}
            {{- end }}
            {{- with .Values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            {{- if .Values.credentials.secretName }}
            - name: SCW_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.secretName }}
                  key: SCW_ACCESS_KEY
            - name: SCW_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.secretName }}
                  key: SCW_SECRET_KEY
            - name: SCW_DEFAULT_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.secretName }}
                  key: SCW_DEFAULT_PROJECT_ID
            {{- end }}
            {{- if .Values.agentToken.secretName }}
            - name: BIGFLEET_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.agentToken.secretName }}
                  key: {{ .Values.agentToken.secretKey }}
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.ports.grpc }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.ports.metrics }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.offerings.content }}
            - name: offerings
              mountPath: /etc/bigfleet/offerings
              readOnly: true
            {{- end }}
            {{- if .Values.baseUserData.content }}
            - name: base-user-data
              mountPath: /etc/bigfleet/base-user-data
              readOnly: true
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /etc/bigfleet/tls
              readOnly: true
            {{- end }}
            {{- if .Values.state.enabled }}
            - name: state
              mountPath: {{ dir .Values.state.path }}
            {{- end }}
      volumes:
        {{- if .Values.offerings.content }}
        - name: offerings
          configMap:
            name: {{ include "bigfleet-scaleway.fullname" . }}-offerings
        {{- end }}
        {{- if .Values.baseUserData.content }}
        - name: base-user-data
          configMap:
            name: {{ include "bigfleet-scaleway.fullname" . }}-base-user-data
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- end }}
        {{- if .Values.state.enabled }}
        - name: state
          {{- if .Values.state.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "bigfleet-scaleway.fullname" . }}-state
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
