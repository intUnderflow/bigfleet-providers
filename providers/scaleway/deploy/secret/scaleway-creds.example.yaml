# Example Secret wiring for the BigFleet Scaleway provider.
#
# Scaleway auth is API-key based: an IAM-application access key + secret key, plus
# the default project id. This is the Scaleway analogue of an AWS IAM role —
# instead of a role + trust policy, you create an IAM application + policy + API
# key (see ../iam/main.tf), store the key here, and the chart mounts the three
# values as the SCW_* env vars the Scaleway SDK reads.
#
# DO NOT commit a real secret key. Prefer creating the Secret imperatively:
#
#   kubectl -n bigfleet create secret generic bigfleet-scaleway-creds \
#     --from-literal=SCW_ACCESS_KEY="$SCW_ACCESS_KEY" \
#     --from-literal=SCW_SECRET_KEY="$SCW_SECRET_KEY" \
#     --from-literal=SCW_DEFAULT_PROJECT_ID="$SCW_DEFAULT_PROJECT_ID"
#
# ...or have an external secrets operator (External Secrets Operator, Vault)
# populate the same name/keys. The chart only needs the Secret to exist.
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-scaleway-creds
  namespace: bigfleet
type: Opaque
stringData:
  # IAM-application API key (least-privilege; see ../iam). Replace before apply.
  SCW_ACCESS_KEY: "REPLACE_WITH_SCW_ACCESS_KEY"
  SCW_SECRET_KEY: "REPLACE_WITH_SCW_SECRET_KEY"
  SCW_DEFAULT_PROJECT_ID: "REPLACE_WITH_PROJECT_ID"
---
# The HMAC secret the provider uses to mint each on-host agent's per-machine
# bearer token. The agent dials the provider's HTTPS bootstrap channel during
# Configure, long-polls for its own command, applies the cluster-join blob, and
# acks; the provider authorises it with HMAC(secret, machine_id). Pin this so
# tokens survive a provider restart. Create it imperatively:
#
#   kubectl -n bigfleet create secret generic bigfleet-scaleway-bootstrap \
#     --from-literal=bootstrap-secret="$(openssl rand -hex 32)"
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-scaleway-bootstrap
  namespace: bigfleet
type: Opaque
stringData:
  # A high-entropy HMAC secret. Replace before apply.
  bootstrap-secret: "REPLACE_WITH_RANDOM_HMAC_SECRET"
---
# The TLS server certificate for the provider's bootstrap channel. The on-host
# agent pins ca.crt to verify it is talking to the real provider; the
# secret-bearing blob therefore always travels over authenticated TLS. Use a
# real cert (cert-manager, your CA) whose SAN matches --bootstrap-endpoint; this
# is only a placeholder. Mount via bootstrap.tls.secretName in the chart.
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-scaleway-bootstrap-tls
  namespace: bigfleet
type: kubernetes.io/tls
stringData:
  tls.crt: "REPLACE_WITH_BOOTSTRAP_SERVER_CERT_PEM"
  tls.key: "REPLACE_WITH_BOOTSTRAP_SERVER_KEY_PEM"
  # The CA the agent pins (defaults to tls.crt if omitted).
  ca.crt: "REPLACE_WITH_BOOTSTRAP_CA_PEM"
