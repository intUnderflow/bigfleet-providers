# Example Secret wiring for the BigFleet Hetzner Cloud provider.
#
# Hetzner Cloud has no IAM/role model — the entire authorisation surface is a
# single project-scoped API token. This is the Hetzner analogue of an AWS IAM
# role: instead of a role + policy + trust, you mint one Read & Write token in the
# Hetzner Cloud Console (Security -> API Tokens), store it here, and the chart
# mounts it as the HCLOUD_TOKEN env var.
#
# DO NOT commit a real token. Prefer creating the Secret imperatively:
#
#   kubectl -n bigfleet create secret generic bigfleet-hetzner-token \
#     --from-literal=token="$HCLOUD_TOKEN"
#
# ...or generate it from this template with the value substituted at apply time,
# or have an external secrets operator (External Secrets Operator, Vault) populate
# the same name/key. The chart only needs the Secret to exist.
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-hetzner-token
  namespace: bigfleet
type: Opaque
stringData:
  # A project-scoped, Read & Write Hetzner Cloud API token. Replace before apply.
  token: "REPLACE_WITH_HCLOUD_TOKEN"
---
# The SSH private key the provider uses to deliver the per-cluster bootstrap blob
# and to cordon/drain (Hetzner Cloud has no in-guest command API). The base image
# must authorise the matching PUBLIC key. Create it imperatively:
#
#   kubectl -n bigfleet create secret generic bigfleet-hetzner-ssh \
#     --from-file=id_ed25519=./id_ed25519
apiVersion: v1
kind: Secret
metadata:
  name: bigfleet-hetzner-ssh
  namespace: bigfleet
type: Opaque
stringData:
  # The SSH private key (PEM/OpenSSH). Replace before apply, or use --from-file.
  id_ed25519: "REPLACE_WITH_SSH_PRIVATE_KEY"
