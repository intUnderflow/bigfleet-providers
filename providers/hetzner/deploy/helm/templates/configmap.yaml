{{- if .Values.offerings.content }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bigfleet-hetzner.fullname" . }}-offerings
  labels:
    {{- include "bigfleet-hetzner.labels" . | nindent 4 }}
data:
  offerings.json: |
    {{- .Values.offerings.content | nindent 4 }}
{{- end }}
{{- if .Values.baseUserData.content }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bigfleet-hetzner.fullname" . }}-base-user-data
  labels:
    {{- include "bigfleet-hetzner.labels" . | nindent 4 }}
data:
  base-user-data: |
    {{- .Values.baseUserData.content | nindent 4 }}
{{- end }}
